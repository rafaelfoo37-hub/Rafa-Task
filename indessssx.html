<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Rafael's Task</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: -apple-system, sans-serif;
  background: #F5F2E8;
  color: #1B2D5B;
  min-height: 100vh;
}

.hero {
  text-align: center;
  padding: 10px 16px 8px;
  border-bottom: 1px solid rgba(27,45,91,0.15);
}

.hero h1 {
  font-size: 26px;
  font-weight: 900;
  color: #1B2D5B;
  line-height: 1;
}

.hero h1 span {
  display: inline;
  font-size: 20px;
  font-weight: 400;
  font-style: italic;
  margin-right: 5px;
}

.progress-label {
  display: flex;
  justify-content: space-between;
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  margin: 6px 0 4px;
}

.progress-bar {
  height: 4px;
  background: rgba(27,45,91,0.12);
  border-radius: 2px;
  overflow: hidden;
}

.progress-fill {
  height: 100%;
  background: #1B2D5B;
  border-radius: 2px;
  transition: width 0.3s;
}

.page-nav {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 6px 10px;
  border-bottom: 1px solid rgba(27,45,91,0.15);
  gap: 6px;
  flex-wrap: wrap;
}

.nav-btn {
  background: transparent;
  border: 2px solid #1B2D5B;
  color: #1B2D5B;
  font-size: 12px;
  font-weight: bold;
  text-transform: uppercase;
  border-radius: 6px;
  cursor: pointer;
  min-width: 52px;
  min-height: 34px;
  padding: 6px 10px;
}

.nav-btn:disabled { opacity: 0.25; }

.page-tabs {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  justify-content: center;
  flex: 1;
}

.page-tab {
  padding: 6px 12px;
  border: 2px solid rgba(27,45,91,0.2);
  border-radius: 6px;
  font-size: 12px;
  font-weight: bold;
  cursor: pointer;
  min-height: 34px;
  background: transparent;
  color: #1B2D5B;
}

.page-tab.active {
  background: #1B2D5B;
  color: #F5F2E8;
  border-color: #1B2D5B;
}

.add-page-btn {
  padding: 6px 10px;
  border: 2px dashed rgba(27,45,91,0.3);
  border-radius: 6px;
  font-size: 12px;
  font-weight: bold;
  cursor: pointer;
  min-height: 34px;
  background: transparent;
  color: #1B2D5B;
}

.task-list {
  padding: 8px 12px;
  max-width: 700px;
  margin: 0 auto;
}

.task-card {
  background: white;
  border: 1px solid rgba(27,45,91,0.12);
  border-radius: 12px;
  padding: 10px 12px;
  margin-bottom: 8px;
}

.task-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
}

.task-name {
  font-size: 17px;
  flex: 1;
  line-height: 1.4;
  font-weight: 600;
}

.task-icons {
  display: flex;
  gap: 4px;
  flex-shrink: 0;
}

.icon-btn {
  width: 32px;
  height: 32px;
  border: none;
  background: transparent;
  cursor: pointer;
  font-size: 15px;
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
}

.icon-btn:active { background: rgba(27,45,91,0.1); }

.due-icon { opacity: 0.25; }
.due-icon.has-date { opacity: 0.6; }
.due-icon.overdue { opacity: 1; color: #991b1b; }
.del-icon { opacity: 0.2; }

.status-row {
  display: flex;
  gap: 5px;
  margin-top: 7px;
}

.s-btn {
  flex: 1;
  padding: 5px 2px;
  border-radius: 6px;
  border: 1.5px solid rgba(27,45,91,0.15);
  background: transparent;
  cursor: pointer;
  font-size: 9px;
  font-weight: bold;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  color: rgba(27,45,91,0.4);
  min-height: 30px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 2px;
}

.s-btn .icon { font-size: 11px; }

.s-btn.active-ns {
  border-color: #1B2D5B;
  color: #1B2D5B;
  background: rgba(27,45,91,0.06);
}

.s-btn.active-wip {
  border-color: #B45309;
  color: #B45309;
  background: #FEF3C7;
}

.s-btn.active-done {
  border-color: #2E7D52;
  color: #2E7D52;
  background: #E8F5EE;
}

.due-row {
  display: none;
  margin-top: 8px;
  align-items: center;
  gap: 8px;
}

.due-row.open { display: flex; }

.due-input {
  flex: 1;
  padding: 10px;
  border: 1px solid rgba(27,45,91,0.2);
  border-radius: 6px;
  font-size: 14px;
  color: #1B2D5B;
  background: #F5F2E8;
  min-height: 44px;
}

.due-clear {
  width: 40px;
  height: 40px;
  border: none;
  background: transparent;
  font-size: 20px;
  cursor: pointer;
  color: #1B2D5B;
  opacity: 0.4;
  border-radius: 8px;
}

.due-chip {
  font-size: 11px;
  font-weight: 600;
  color: #1B2D5B;
  margin-top: 4px;
  background: rgba(27,45,91,0.07);
  display: inline-block;
  padding: 2px 8px;
  border-radius: 20px;
  letter-spacing: 0.02em;
}

.due-chip.overdue { color: #991b1b; background: #FEE2E2; }

.add-wrap {
  padding: 12px 16px 32px;
  max-width: 700px;
  margin: 0 auto;
  display: flex;
  gap: 8px;
}

.add-input {
  flex: 1;
  padding: 0 14px;
  height: 50px;
  border: 2px solid rgba(27,45,91,0.2);
  border-radius: 8px;
  font-size: 15px;
  color: #1B2D5B;
  background: white;
  outline: none;
}

.add-input:focus { border-color: #1B2D5B; }

.add-btn {
  padding: 0 20px;
  height: 50px;
  background: #1B2D5B;
  color: #F5F2E8;
  border: none;
  border-radius: 8px;
  font-size: 15px;
  font-weight: bold;
  cursor: pointer;
}

.footer {
  text-align: center;
  padding: 20px 16px;
  border-top: 2px solid #1B2D5B;
  font-size: 15px;
  color: #1B2D5B;
  font-style: italic;
}
</style>
</head>
<body>

<div class="hero">
  <h1><span>Rafael's</span>Task</h1>
  <div class="progress-label">
    <span id="prog-txt">0 / 0 done</span>
    <span id="prog-pct">0%</span>
  </div>
  <div class="progress-bar">
    <div class="progress-fill" id="prog-fill" style="width:0%"></div>
  </div>
</div>

<div class="page-nav">
  <button class="nav-btn" id="btn-prev" disabled>← Prev</button>
  <div class="page-tabs" id="page-tabs"></div>
  <button class="add-page-btn" id="btn-add-page">+ Page</button>
  <button class="nav-btn" id="btn-next">Next →</button>
</div>

<div class="task-list" id="task-list"></div>

<div class="add-wrap">
  <input class="add-input" id="new-task" type="text" placeholder="Add a new task..." maxlength="80" />
  <button class="add-btn" id="btn-add-task">Add</button>
</div>

<div class="footer">remember, <em>consistency</em> over perfection.</div>

<script>
var S;
try { S = JSON.parse(localStorage.getItem('rt5') || 'null'); } catch(e) { S = null; }
if (!S) {
  S = {
    week: 1, page: 0,
    pages: [{ name: 'Page 1', tasks: ['Wake up at 7AM','Morning stretches','Declutter space','Read a bit','Add to savings','Eat fruits & veggies','Get moving','Finish skincare','Write in journal','Sleep before 11PM'] }],
    status: {}, due: {}
  };
}

function save() { try { localStorage.setItem('rt5', JSON.stringify(S)); } catch(e) {} }

function sk(t) { return S.page + '_' + t + '_' + S.week; }
function getStatus(t) { return S.status[sk(t)] || 'ns'; }
function setStatus(t, v) { S.status[sk(t)] = v; save(); render(); }

function dk(t) { return S.page + '_' + t; }
function getDue(t) { return S.due[dk(t)] || ''; }
function setDue(t, v) {
  if (v) S.due[dk(t)] = v;
  else delete S.due[dk(t)];
  save(); render();
}

function isLate(d) {
  if (!d) return false;
  var today = new Date(); today.setHours(0,0,0,0);
  return new Date(d) < today;
}

function fmtDate(d) {
  if (!d) return '';
  return new Date(d + 'T00:00:00').toLocaleDateString('en-GB', {day:'numeric', month:'short'});
}

function render() {
  var p = S.page;
  var tasks = S.pages[p].tasks;

  var tabsEl = document.getElementById('page-tabs');
  tabsEl.innerHTML = '';
  for (var i = 0; i < S.pages.length; i++) {
    var btn = document.createElement('button');
    btn.className = 'page-tab' + (i === p ? ' active' : '');
    btn.textContent = S.pages[i].name;
    btn.setAttribute('data-pi', i);
    tabsEl.appendChild(btn);
  }

  document.getElementById('btn-prev').disabled = (p === 0);
  document.getElementById('btn-next').disabled = (p === S.pages.length - 1);

  var done = 0;
  for (var ti = 0; ti < tasks.length; ti++) {
    if (getStatus(ti) === 'done') done++;
  }
  var total = tasks.length;
  var pct = total ? Math.round(done / total * 100) : 0;
  document.getElementById('prog-txt').textContent = done + ' / ' + total + ' done';
  document.getElementById('prog-pct').textContent = pct + '%';
  document.getElementById('prog-fill').style.width = pct + '%';

  var listEl = document.getElementById('task-list');
  listEl.innerHTML = '';

  if (!tasks.length) {
    var empty = document.createElement('p');
    empty.style.cssText = 'text-align:center;padding:32px;opacity:0.4;font-size:14px;';
    empty.textContent = 'No tasks yet — add one below';
    listEl.appendChild(empty);
    return;
  }

  for (var ti = 0; ti < tasks.length; ti++) {
    listEl.appendChild(makeCard(ti, tasks[ti]));
  }
}

function makeCard(ti, taskName) {
  var cur = getStatus(ti);
  var due = getDue(ti);
  var late = isLate(due) && cur !== 'done';
  var pid = 'dp_' + ti;

  var card = document.createElement('div');
  card.className = 'task-card';

  var topDiv = document.createElement('div');
  topDiv.className = 'task-top';

  var nameSpan = document.createElement('span');
  nameSpan.className = 'task-name';
  nameSpan.textContent = (ti + 1) + '. ' + taskName;

  var iconsDiv = document.createElement('div');
  iconsDiv.className = 'task-icons';

  var dueBtn = document.createElement('button');
  dueBtn.className = 'icon-btn';
  dueBtn.innerHTML = '<span class="due-icon' + (due ? (late ? ' overdue' : ' has-date') : '') + '">📅</span>';
  dueBtn.addEventListener('click', function() {
    var dpEl = document.getElementById(pid);
    if (!dpEl) return;
    var isOpen = dpEl.classList.contains('open');
    document.querySelectorAll('.due-row.open').forEach(function(x) { x.classList.remove('open'); });
    if (!isOpen) dpEl.classList.add('open');
  });

  var delBtn = document.createElement('button');
  delBtn.className = 'icon-btn';
  delBtn.innerHTML = '<span class="del-icon">✕</span>';
  delBtn.addEventListener('click', function() {
    if (confirm('Remove this task?')) {
      S.pages[S.page].tasks.splice(ti, 1);
      save(); render();
    }
  });

  iconsDiv.appendChild(dueBtn);
  iconsDiv.appendChild(delBtn);
  topDiv.appendChild(nameSpan);
  topDiv.appendChild(iconsDiv);
  card.appendChild(topDiv);

  if (due) {
    var chip = document.createElement('div');
    chip.className = 'due-chip' + (late ? ' overdue' : '');
    chip.textContent = 'due ' + fmtDate(due) + (late ? ' · overdue' : '');
    card.appendChild(chip);
  }

  var dpRow = document.createElement('div');
  dpRow.className = 'due-row';
  dpRow.id = pid;

  var dpInp = document.createElement('input');
  dpInp.type = 'date';
  dpInp.className = 'due-input';
  dpInp.value = due;
  dpInp.addEventListener('change', function() { setDue(ti, dpInp.value); });
  dpRow.appendChild(dpInp);

  if (due) {
    var clearBtn = document.createElement('button');
    clearBtn.className = 'due-clear';
    clearBtn.textContent = '✕';
    clearBtn.addEventListener('click', function() { setDue(ti, ''); });
    dpRow.appendChild(clearBtn);
  }

  card.appendChild(dpRow);

  var statusRow = document.createElement('div');
  statusRow.className = 'status-row';

  var statuses = [
    { val: 'ns',   icon: '○', label: 'Not started', cls: 'active-ns'  },
    { val: 'wip',  icon: '◑', label: 'In progress', cls: 'active-wip' },
    { val: 'done', icon: '●', label: 'Done',         cls: 'active-done'}
  ];

  statuses.forEach(function(st) {
    var btn = document.createElement('button');
    btn.className = 's-btn' + (cur === st.val ? ' ' + st.cls : '');
    btn.innerHTML = '<span class="icon">' + st.icon + '</span><span>' + st.label + '</span>';
    btn.addEventListener('click', function() { setStatus(ti, st.val); });
    statusRow.appendChild(btn);
  });

  card.appendChild(statusRow);
  return card;
}

document.getElementById('btn-prev').addEventListener('click', function() {
  if (S.page > 0) { S.page--; save(); render(); }
});
document.getElementById('btn-next').addEventListener('click', function() {
  if (S.page < S.pages.length - 1) { S.page++; save(); render(); }
});
document.getElementById('btn-add-page').addEventListener('click', function() {
  S.pages.push({ name: 'Page ' + (S.pages.length + 1), tasks: [] });
  S.page = S.pages.length - 1;
  save(); render();
});
document.getElementById('page-tabs').addEventListener('click', function(e) {
  var btn = e.target.closest('[data-pi]');
  if (btn) { S.page = parseInt(btn.getAttribute('data-pi')); save(); render(); }
});
document.getElementById('btn-add-task').addEventListener('click', function() {
  var inp = document.getElementById('new-task');
  var text = inp.value.trim();
  if (!text) return;
  S.pages[S.page].tasks.push(text);
  inp.value = '';
  save(); render();
});
document.getElementById('new-task').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') { e.preventDefault(); document.getElementById('btn-add-task').click(); }
});

render();
</script>
</body>
</html>
