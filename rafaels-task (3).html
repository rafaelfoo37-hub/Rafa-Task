<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>Rafael's Task</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --cream:#F5F2E8;--navy:#1B2D5B;--fade:rgba(27,45,91,0.12);
  --amber:#B45309;--amber-bg:#FEF3C7;
  --green:#2E7D52;--green-bg:#E8F5EE;
  --red:#991b1b;
  --mono:'DM Mono',monospace;--serif:'Playfair Display',serif;
}
html,body{min-height:100%;background:var(--cream);font-family:var(--mono);color:var(--navy);-webkit-text-size-adjust:100%;}
.app{min-height:100vh;display:flex;flex-direction:column;}

/* TOPBAR */
.topbar{display:flex;justify-content:space-between;align-items:center;padding:.9rem 1rem;border-bottom:1px solid var(--fade);position:sticky;top:0;background:var(--cream);z-index:10;}
.meta{font-size:11px;letter-spacing:.1em;text-transform:uppercase;}
.week-nav{display:flex;align-items:center;gap:5px;}
.wk-lbl{font-size:11px;letter-spacing:.1em;text-transform:uppercase;margin-right:2px;}
.wk-dot{width:36px;height:36px;border-radius:50%;border:1.5px solid var(--navy);display:flex;align-items:center;justify-content:center;font-size:12px;font-family:var(--mono);cursor:pointer;user-select:none;}
.wk-dot.on{background:var(--navy);color:var(--cream);}

/* HERO */
.hero{text-align:center;padding:1.8rem 1rem 1.2rem;border-bottom:1px solid var(--fade);}
.hero h1{font-family:var(--serif);color:var(--navy);line-height:1.05;}
.script{font-style:italic;font-weight:400;font-size:clamp(2rem,7vw,3rem);display:block;}
.blk{font-style:normal;font-weight:700;font-size:clamp(2.4rem,8vw,3.6rem);display:block;letter-spacing:-.02em;}
.prog-wrap{max-width:480px;margin:.9rem auto 0;}
.prog-row{display:flex;justify-content:space-between;font-size:11px;letter-spacing:.08em;text-transform:uppercase;margin-bottom:5px;}
.prog-bar{height:4px;background:var(--fade);border-radius:2px;overflow:hidden;}
.prog-fill{height:100%;background:var(--navy);border-radius:2px;transition:width .3s;}

/* PAGE NAV */
.page-nav{display:flex;align-items:center;justify-content:space-between;padding:.6rem .8rem;border-bottom:1px solid var(--fade);gap:.4rem;}
.nav-btn{background:none;border:1.5px solid var(--navy);color:var(--navy);font-family:var(--mono);font-size:11px;letter-spacing:.08em;text-transform:uppercase;padding:0 14px;border-radius:4px;cursor:pointer;height:42px;min-width:66px;}
.nav-btn:active{background:var(--navy);color:var(--cream);}
.nav-btn:disabled{opacity:.25;pointer-events:none;}
.tabs-wrap{display:flex;align-items:center;gap:6px;flex-wrap:wrap;justify-content:center;}
.tab{padding:0 12px;height:38px;border:1.5px solid var(--fade);border-radius:4px;font-size:11px;font-family:var(--mono);cursor:pointer;display:flex;align-items:center;user-select:none;}
.tab.on{border-color:var(--navy);background:var(--navy);color:var(--cream);}
.add-pg-btn{background:none;border:1.5px dashed rgba(27,45,91,.25);color:var(--navy);font-family:var(--mono);font-size:11px;letter-spacing:.08em;text-transform:uppercase;padding:0 12px;border-radius:4px;cursor:pointer;height:38px;}
.add-pg-btn:active{border-style:solid;border-color:var(--navy);}

/* LEGEND */
.legend{display:flex;gap:12px;justify-content:center;align-items:center;padding:.55rem 1rem;border-bottom:1px solid var(--fade);flex-wrap:wrap;}
.leg-item{display:flex;align-items:center;gap:5px;font-size:10px;letter-spacing:.07em;text-transform:uppercase;}
.pip{width:10px;height:10px;border-radius:50%;border:1.5px solid;flex-shrink:0;}
.pip-ns{border-color:rgba(27,45,91,.3);}
.pip-wip{border-color:var(--amber);background:var(--amber-bg);}
.pip-done{border-color:var(--green);background:var(--green-bg);}

/* TABLE */
.tbl-wrap{flex:1;overflow-x:auto;-webkit-overflow-scrolling:touch;padding:0 .4rem 3rem;}
table{width:100%;max-width:700px;margin:1rem auto 0;border-collapse:collapse;}
thead th{font-size:10px;letter-spacing:.12em;text-transform:uppercase;padding:9px 3px;color:var(--navy);border-bottom:1.5px solid var(--navy);font-weight:500;text-align:center;}
thead th:first-child{text-align:left;padding-left:8px;width:38%;}
tbody tr{border-bottom:1px solid var(--fade);}
tbody tr:last-child{border-bottom:none;}
.t-name{font-size:13px;padding:11px 6px;vertical-align:top;}
.t-row{display:flex;align-items:center;gap:2px;}
.t-text{flex:1;min-width:0;word-break:break-word;line-height:1.4;padding-top:2px;}

/* icon buttons */
.ico{background:none;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;width:38px;height:38px;border-radius:6px;flex-shrink:0;font-size:16px;}
.ico:active{background:var(--fade);}
.ico.due-ico{opacity:.2;color:var(--navy);}
.ico.due-ico.set{opacity:.5;}
.ico.due-ico.late{opacity:1;color:var(--red);}
.ico.del-ico{opacity:.2;color:var(--navy);font-size:19px;}
.ico.del-ico:active{opacity:.7;}

.due-chip{font-size:10px;letter-spacing:.04em;color:rgba(27,45,91,.45);margin-top:2px;padding-left:2px;}
.due-chip.late{color:var(--red);}

.dp-wrap{margin-top:5px;display:none;align-items:center;gap:6px;}
.dp-wrap.open{display:flex;}
.dp-inp{font-family:var(--mono);font-size:14px;color:var(--navy);border:1px solid var(--fade);border-radius:4px;background:var(--cream);padding:8px;height:42px;max-width:165px;width:100%;outline:none;}
.dp-clear{background:none;border:none;font-size:20px;cursor:pointer;color:var(--navy);opacity:.3;width:38px;height:38px;display:flex;align-items:center;justify-content:center;border-radius:4px;}
.dp-clear:active{opacity:.7;background:var(--fade);}

/* STATUS BTN */
.cell{text-align:center;padding:7px 3px;vertical-align:middle;}
.s-btn{display:inline-flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;width:100%;min-height:54px;min-width:60px;padding:8px 3px;border-radius:8px;border:1.5px solid var(--fade);background:transparent;cursor:pointer;font-family:var(--mono);color:rgba(27,45,91,.32);user-select:none;}
.s-btn:active{opacity:.65;}
.s-btn.on-ns{border-color:var(--navy);background:rgba(27,45,91,.05);color:var(--navy);box-shadow:inset 0 0 0 1px var(--navy);}
.s-btn.on-wip{border-color:var(--amber);background:var(--amber-bg);color:var(--amber);}
.s-btn.on-done{border-color:var(--green);background:var(--green-bg);color:var(--green);}
.s-icon{font-size:17px;line-height:1;}
.s-lbl{font-size:9px;letter-spacing:.06em;text-transform:uppercase;line-height:1;}

/* ADD */
.add-wrap{max-width:700px;margin:1rem auto 0;display:flex;gap:8px;padding:0 .6rem;}
.add-inp{flex:1;padding:0 14px;height:50px;border:1.5px solid var(--fade);border-radius:6px;background:transparent;font-family:var(--mono);font-size:15px;color:var(--navy);outline:none;}
.add-inp:focus{border-color:var(--navy);}
.add-inp::placeholder{color:var(--navy);opacity:.35;}
.add-btn{padding:0 18px;height:50px;background:none;border:1.5px solid var(--navy);border-radius:6px;font-family:var(--mono);font-size:13px;letter-spacing:.08em;text-transform:uppercase;color:var(--navy);cursor:pointer;white-space:nowrap;}
.add-btn:active{background:var(--navy);color:var(--cream);}

/* FOOTER */
.footer{text-align:center;padding:1.4rem;border-top:1.5px solid var(--navy);font-family:var(--serif);font-size:clamp(13px,3vw,16px);color:var(--navy);margin-top:auto;}
.footer em{font-style:italic;}

@media(max-width:380px){
  .s-lbl{display:none;}
  .s-btn{min-width:44px;min-height:46px;}
  thead th:first-child{width:32%;}
}
</style>
</head>
<body>
<div class="app">

  <!-- TOPBAR -->
  <div class="topbar">
    <span class="meta" id="month-lbl">MONTH: JANUARY</span>
    <div class="week-nav">
      <span class="wk-lbl">WEEK</span>
      <div class="wk-dot on" data-week="1">1</div>
      <div class="wk-dot" data-week="2">2</div>
      <div class="wk-dot" data-week="3">3</div>
      <div class="wk-dot" data-week="4">4</div>
    </div>
  </div>

  <!-- HERO -->
  <div class="hero">
    <h1><span class="script">Rafael's</span><span class="blk">Task</span></h1>
    <div class="prog-wrap">
      <div class="prog-row"><span id="prog-txt">0 / 0 done</span><span id="prog-pct">0%</span></div>
      <div class="prog-bar"><div class="prog-fill" id="prog-fill" style="width:0%"></div></div>
    </div>
  </div>

  <!-- PAGE NAV -->
  <div class="page-nav">
    <button class="nav-btn" id="prev-btn" disabled>&#8592; Prev</button>
    <div class="tabs-wrap">
      <div id="page-tabs"></div>
      <button class="add-pg-btn" id="add-page-btn">+ Page</button>
    </div>
    <button class="nav-btn" id="next-btn">Next &#8594;</button>
  </div>

  <!-- LEGEND -->
  <div class="legend">
    <div class="leg-item"><div class="pip pip-ns"></div>Hasn't started</div>
    <div class="leg-item"><div class="pip pip-wip"></div>In progress</div>
    <div class="leg-item"><div class="pip pip-done"></div>Done</div>
  </div>

  <!-- TABLE -->
  <div class="tbl-wrap">
    <table>
      <thead><tr>
        <th style="text-align:left;padding-left:8px;">Task</th>
        <th>Hasn't<br>Started</th>
        <th>In<br>Progress</th>
        <th>Done</th>
      </tr></thead>
      <tbody id="tbody"></tbody>
    </table>
    <div class="add-wrap">
      <input class="add-inp" id="new-task" placeholder="Add a new task..." maxlength="80" type="text" />
      <button class="add-btn" id="add-task-btn">Add</button>
    </div>
  </div>

  <div class="footer">remember, <em>consistency</em> over perfection.</div>
</div>

<script>
const MONTHS=['JANUARY','FEBRUARY','MARCH','APRIL','MAY','JUNE','JULY','AUGUST','SEPTEMBER','OCTOBER','NOVEMBER','DECEMBER'];

// ── STATE ──
let S = JSON.parse(localStorage.getItem('rt4')||'null') || {
  month: new Date().getMonth(),
  week: 1,
  page: 0,
  pages: [{name:'Page 1', tasks:[
    'Wake up at 7AM','Morning stretches','Declutter space','Read a bit',
    'Add to savings','Eat fruits & veggies','Get moving','Finish skincare',
    'Write in journal','Sleep before 11PM'
  ]}],
  status:{},
  due:{}
};

function save(){ try{ localStorage.setItem('rt4', JSON.stringify(S)); }catch(e){} }

function getStatus(t){ return S.status[S.page+'_'+t+'_'+S.week]||'ns'; }
function setStatus(t,v){ S.status[S.page+'_'+t+'_'+S.week]=v; save(); render(); }

function getDue(t){ return S.due[S.page+'_'+t]||''; }
function setDue(t,v){
  if(v) S.due[S.page+'_'+t]=v;
  else delete S.due[S.page+'_'+t];
  save(); render();
}

function isLate(d){
  if(!d) return false;
  const today=new Date(); today.setHours(0,0,0,0);
  return new Date(d)<today;
}
function fmtDate(d){
  if(!d) return '';
  return new Date(d+'T00:00:00').toLocaleDateString('en-GB',{day:'numeric',month:'short'});
}

// ── RENDER ──
function render(){
  const p=S.page, pg=S.pages[p], tasks=pg.tasks;

  document.getElementById('month-lbl').textContent='MONTH: '+MONTHS[S.month];

  // week dots
  document.querySelectorAll('.wk-dot').forEach(el=>{
    el.classList.toggle('on', +el.dataset.week===S.week);
  });

  // tabs
  const tabsEl=document.getElementById('page-tabs');
  tabsEl.innerHTML='';
  S.pages.forEach((pg2,i)=>{
    const d=document.createElement('div');
    d.className='tab'+(i===p?' on':'');
    d.textContent=pg2.name;
    d.dataset.pi=i;
    tabsEl.appendChild(d);
  });

  document.getElementById('prev-btn').disabled=p===0;
  document.getElementById('next-btn').disabled=p===S.pages.length-1;

  // progress
  const done=tasks.filter((_,ti)=>getStatus(ti)==='done').length;
  const total=tasks.length;
  const pct=total?Math.round(done/total*100):0;
  document.getElementById('prog-txt').textContent=done+' / '+total+' done';
  document.getElementById('prog-pct').textContent=pct+'%';
  document.getElementById('prog-fill').style.width=pct+'%';

  // tbody
  const tbody=document.getElementById('tbody');
  if(!tasks.length){
    tbody.innerHTML='<tr><td colspan="4" style="text-align:center;padding:2.5rem;opacity:.38;font-size:13px;">No tasks yet — add one below</td></tr>';
    return;
  }

  tbody.innerHTML='';
  tasks.forEach((task, ti)=>{
    const cur=getStatus(ti);
    const due=getDue(ti);
    const late=isLate(due)&&cur!=='done';
    const pid='dp_'+ti;

    const tr=document.createElement('tr');
    tr.innerHTML=
      '<td class="t-name">'
      +'<div class="t-row">'
      +'<span class="t-text">'+(ti+1)+'. '+escHtml(task)+'</span>'
      +'<button class="ico due-ico'+(due?(late?' late':' set'):'')+'" data-action="toggle-dp" data-id="'+pid+'" title="Set due date">&#x1F4C5;</button>'
      +'<button class="ico del-ico" data-action="del" data-ti="'+ti+'">&#215;</button>'
      +'</div>'
      +(due?'<div class="due-chip'+(late?' late':'')+'">due '+fmtDate(due)+(late?' · overdue':'')+'</div>':'')
      +'<div class="dp-wrap" id="'+pid+'">'
      +'<input class="dp-inp" type="date" value="'+due+'" data-action="set-due" data-ti="'+ti+'" />'
      +(due?'<button class="dp-clear" data-action="clear-due" data-ti="'+ti+'">&#215;</button>':'')
      +'</div>'
      +'</td>'
      +'<td class="cell"><button class="s-btn'+(cur==='ns'?' on-ns':'')+'" data-action="status" data-ti="'+ti+'" data-val="ns"><span class="s-icon">&#9675;</span><span class="s-lbl">Not started</span></button></td>'
      +'<td class="cell"><button class="s-btn'+(cur==='wip'?' on-wip':'')+'" data-action="status" data-ti="'+ti+'" data-val="wip"><span class="s-icon">&#9681;</span><span class="s-lbl">In progress</span></button></td>'
      +'<td class="cell"><button class="s-btn'+(cur==='done'?' on-done':'')+'" data-action="status" data-ti="'+ti+'" data-val="done"><span class="s-icon">&#9679;</span><span class="s-lbl">Done</span></button></td>';

    tbody.appendChild(tr);
  });
}

function escHtml(s){
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── EVENT DELEGATION — one listener handles ALL clicks/changes ──
document.addEventListener('click', function(e){
  const el=e.target.closest('[data-action]');
  if(!el) return;
  const action=el.dataset.action;

  if(action==='status'){
    setStatus(+el.dataset.ti, el.dataset.val);
  }
  else if(action==='del'){
    if(confirm('Remove this task?')){
      S.pages[S.page].tasks.splice(+el.dataset.ti,1);
      save(); render();
    }
  }
  else if(action==='toggle-dp'){
    const dp=document.getElementById(el.dataset.id);
    if(!dp) return;
    const opening=!dp.classList.contains('open');
    document.querySelectorAll('.dp-wrap.open').forEach(x=>x.classList.remove('open'));
    if(opening){
      dp.classList.add('open');
      setTimeout(()=>dp.querySelector('.dp-inp').focus(),60);
    }
  }
  else if(action==='clear-due'){
    setDue(+el.dataset.ti,'');
  }
  else if(action==='add-task'){
    doAddTask();
  }
  else if(action==='add-page'){
    S.pages.push({name:'Page '+(S.pages.length+1),tasks:[]});
    S.page=S.pages.length-1;
    save(); render();
  }
  else if(action==='prev'){
    if(S.page>0){ S.page--; save(); render(); }
  }
  else if(action==='next'){
    if(S.page<S.pages.length-1){ S.page++; save(); render(); }
  }
  else if(action==='goto-page'){
    S.page=+el.dataset.pi; save(); render();
  }
  else if(action==='set-week'){
    S.week=+el.dataset.week; save(); render();
  }
});

// date input change
document.addEventListener('change', function(e){
  const el=e.target.closest('[data-action="set-due"]');
  if(el) setDue(+el.dataset.ti, el.value);
});

// wire static buttons with data-action
document.getElementById('prev-btn').dataset.action='prev';
document.getElementById('next-btn').dataset.action='next';
document.getElementById('add-task-btn').dataset.action='add-task';
document.getElementById('add-page-btn').dataset.action='add-page';

// week dots
document.querySelectorAll('.wk-dot').forEach(el=>el.dataset.action='set-week');

// page tabs use event delegation via tabsEl
document.getElementById('page-tabs').addEventListener('click',function(e){
  const tab=e.target.closest('.tab');
  if(tab){ S.page=+tab.dataset.pi; save(); render(); }
});

// add task on Enter
document.getElementById('new-task').addEventListener('keydown',function(e){
  if(e.key==='Enter'){ e.preventDefault(); doAddTask(); }
});

function doAddTask(){
  const inp=document.getElementById('new-task');
  const text=inp.value.trim();
  if(!text) return;
  S.pages[S.page].tasks.push(text);
  inp.value=''; inp.blur();
  save(); render();
}

render();
</script>
</body>
</html>
