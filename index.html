<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>Rafael's Task</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --cream:#F5F2E8;--navy:#1B2D5B;--fade:rgba(27,45,91,0.12);
  --amber:#B45309;--amber-bg:#FEF3C7;
  --green:#2E7D52;--green-bg:#E8F5EE;
  --red:#991b1b;
  --pink:#be185d;--pink-bg:#fdf2f8;--pink-fade:rgba(190,24,93,0.10);--pink-border:rgba(190,24,93,0.22);
  --mono:'DM Mono',monospace;--serif:'Playfair Display',serif;
}
.dark{
  --cream:#0f1521;--navy:#c8d8ff;--fade:rgba(200,216,255,0.12);
  --amber:#fbbf24;--amber-bg:rgba(251,191,36,0.12);
  --green:#34d399;--green-bg:rgba(52,211,153,0.12);
  --red:#f87171;
  --pink:#f472b6;--pink-bg:rgba(244,114,182,0.07);--pink-fade:rgba(244,114,182,0.10);--pink-border:rgba(244,114,182,0.22);
}
html,body{min-height:100%;background:var(--cream);font-family:var(--mono);color:var(--navy);-webkit-text-size-adjust:100%;transition:background .3s,color .3s;}
.app{min-height:100vh;display:flex;flex-direction:column;}

.hero{text-align:center;padding:1.2rem 1rem 1rem;border-bottom:1px solid var(--fade);}
.hero h1{font-family:var(--serif);color:var(--navy);line-height:1.05;}
.script{font-style:italic;font-weight:400;font-size:clamp(3rem,10vw,4.5rem);display:block;}
.blk{font-style:normal;font-weight:700;font-size:clamp(3.5rem,12vw,5.5rem);display:block;letter-spacing:-.02em;}
.prog-wrap{max-width:480px;margin:.7rem auto 0;}
.prog-row{display:flex;justify-content:space-between;font-size:11px;letter-spacing:.08em;text-transform:uppercase;margin-bottom:5px;}
.prog-bar{height:4px;background:var(--fade);border-radius:2px;overflow:hidden;}
.prog-fill{height:100%;background:var(--navy);border-radius:2px;transition:width .3s;}

.top-bar{display:flex;justify-content:flex-end;gap:8px;padding:.4rem .8rem;border-bottom:1px solid var(--fade);}
.top-btn{background:none;border:1.5px solid var(--fade);color:var(--navy);font-family:var(--mono);font-size:11px;letter-spacing:.06em;padding:0 10px;border-radius:4px;cursor:pointer;height:32px;}
.top-btn:active{background:var(--fade);}
.top-btn.active{border-color:var(--navy);background:var(--navy);color:var(--cream);}

.search-bar{display:none;padding:.5rem .8rem;border-bottom:1px solid var(--fade);}
.search-bar.open{display:block;}
.search-inp{width:100%;padding:0 14px;height:38px;border:1.5px solid var(--navy);border-radius:20px;background:transparent;font-family:var(--mono);font-size:13px;color:var(--navy);outline:none;}
.search-inp::placeholder{color:var(--navy);opacity:.35;}
.highlight{background:rgba(180,83,9,0.2);border-radius:2px;padding:0 1px;}

.page-nav{display:flex;align-items:center;justify-content:space-between;padding:.5rem .8rem;border-bottom:1px solid var(--fade);gap:.4rem;}
.nav-btn{background:none;border:1.5px solid var(--navy);color:var(--navy);font-family:var(--mono);font-size:11px;letter-spacing:.08em;text-transform:uppercase;padding:0 12px;border-radius:4px;cursor:pointer;height:38px;min-width:58px;}
.nav-btn:active{background:var(--navy);color:var(--cream);}
.nav-btn:disabled{opacity:.25;pointer-events:none;}
.tabs-wrap{display:flex;align-items:center;gap:5px;flex-wrap:wrap;justify-content:center;flex:1;}
.tab-group{display:flex;align-items:center;border:1.5px solid var(--fade);border-radius:4px;overflow:hidden;height:36px;}
.tab-group.on{border-color:var(--navy);background:var(--navy);}
.tab{padding:0 10px;height:100%;font-size:11px;font-family:var(--mono);cursor:pointer;display:flex;align-items:center;user-select:none;background:none;border:none;color:var(--navy);}
.tab-group.on .tab{color:var(--cream);}
.tab-rename{width:26px;height:100%;font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;background:none;border:none;border-left:1px solid rgba(27,45,91,.1);color:rgba(27,45,91,.4);padding:0;}
.tab-group.on .tab-rename{border-left-color:rgba(255,255,255,.2);color:rgba(255,255,255,.55);}
.tab-del{width:26px;height:100%;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;background:none;border:none;border-left:1px solid rgba(27,45,91,.1);color:rgba(27,45,91,.35);padding:0;}
.tab-group.on .tab-del{border-left-color:rgba(255,255,255,.2);color:rgba(255,255,255,.6);}
.add-pg-btn{background:none;border:1.5px dashed rgba(27,45,91,.25);color:var(--navy);font-family:var(--mono);font-size:11px;letter-spacing:.08em;text-transform:uppercase;padding:0 10px;border-radius:4px;cursor:pointer;height:36px;white-space:nowrap;}

.legend{display:flex;gap:12px;justify-content:center;align-items:center;padding:.5rem 1rem;border-bottom:1px solid var(--fade);flex-wrap:wrap;}
.leg-item{display:flex;align-items:center;gap:5px;font-size:10px;letter-spacing:.07em;text-transform:uppercase;}
.pip{width:10px;height:10px;border-radius:50%;border:1.5px solid;flex-shrink:0;}
.pip-ns{border-color:rgba(27,45,91,.3);}
.pip-wip{border-color:var(--amber);background:var(--amber-bg);}
.pip-done{border-color:var(--green);background:var(--green-bg);}

/* UNIFIED TABLE WRAPPER */
.tbl-wrap{flex:1;overflow-x:auto;-webkit-overflow-scrolling:touch;padding:0 0 3rem;}

/* THE ONE TABLE */
table.unified{width:100%;border-collapse:collapse;table-layout:fixed;}

/* COLUMN WIDTHS */
/* Left side: task name | ns | wip | done | actions */
/* Right side: urgent name | ns | wip | done | actions */
/* Divider col in the middle */
table.unified col.c-lname{width:22%;}
table.unified col.c-lstatus{width:7%;}
table.unified col.c-lact{width:5%;}
table.unified col.c-div{width:1%;}
table.unified col.c-rname{width:22%;}
table.unified col.c-rstatus{width:7%;}
table.unified col.c-ract{width:5%;}

/* HEADER ROW */
.unified thead tr{border-bottom:1.5px solid var(--navy);}
.unified thead th{font-size:10px;letter-spacing:.1em;text-transform:uppercase;padding:9px 4px;font-weight:500;text-align:center;vertical-align:bottom;}
.unified thead th.lh{color:var(--navy);border-bottom:1.5px solid var(--navy);}
.unified thead th.rh{color:var(--pink);border-bottom:1.5px solid var(--pink);}
.unified thead th.lh-name{text-align:left;padding-left:8px;}
.unified thead th.rh-name{text-align:left;padding-left:6px;}
.unified thead th.th-div{border-bottom:1.5px solid var(--fade);padding:0;}

/* BODY ROWS */
.unified tbody tr{border-bottom:1px solid var(--fade);}
.unified tbody tr:last-child{border-bottom:none;}

/* LEFT TASK CELL */
.tc-lname{padding:10px 6px;vertical-align:top;}
.tc-rname{padding:10px 6px;vertical-align:top;background:var(--pink-bg);}
.t-row{display:flex;align-items:flex-start;gap:2px;}
.t-text{flex:1;min-width:0;word-break:break-word;line-height:1.35;padding-top:2px;font-size:11px;font-weight:500;white-space:normal;}
.note-ta{width:100%;font-family:var(--mono);font-size:10px;color:var(--navy);background:transparent;border:none;border-top:1px solid var(--fade);margin-top:4px;padding-top:4px;resize:none;outline:none;min-height:26px;line-height:1.4;opacity:.6;}
.note-ta::placeholder{opacity:.35;}
.note-ta.pink-note{border-top-color:var(--pink-border);opacity:.7;}
.note-ta.pink-note::placeholder{color:var(--pink);opacity:.5;}
.due-chip{font-size:10px;font-weight:600;color:var(--navy);margin-top:3px;padding:1px 7px;background:rgba(27,45,91,0.08);border-radius:10px;display:inline-block;}
.due-chip.late{color:var(--red);background:rgba(153,27,27,0.08);}
.dp-wrap{margin-top:5px;display:none;align-items:center;gap:6px;}
.dp-wrap.open{display:flex;}
.dp-inp{font-family:var(--mono);font-size:13px;color:var(--navy);border:1px solid var(--fade);border-radius:4px;background:var(--cream);padding:6px;height:38px;max-width:150px;width:100%;outline:none;}
.dp-clear{background:none;border:none;font-size:18px;cursor:pointer;color:var(--navy);opacity:.3;width:30px;height:30px;display:flex;align-items:center;justify-content:center;border-radius:4px;}

/* STATUS + ACTION CELLS */
.tc-cell{text-align:center;padding:7px 2px;vertical-align:middle;}
.tc-cell.pink-cell{background:var(--pink-bg);}
.tc-div{padding:0;background:var(--fade);width:1px;}
.s-btn{display:inline-flex;align-items:center;justify-content:center;width:32px;height:32px;border-radius:6px;border:1.5px solid var(--fade);background:transparent;cursor:pointer;color:rgba(27,45,91,.32);user-select:none;font-size:14px;}
.s-btn:active{opacity:.65;}
.s-btn.on-ns{border-color:var(--navy);background:rgba(27,45,91,.05);color:var(--navy);box-shadow:inset 0 0 0 1px var(--navy);}
.s-btn.on-wip{border-color:var(--amber);background:var(--amber-bg);color:var(--amber);}
.s-btn.on-done{border-color:var(--green);background:var(--green-bg);color:var(--green);}
.us-btn{display:inline-flex;align-items:center;justify-content:center;width:28px;height:28px;border-radius:5px;border:1.5px solid var(--pink-border);background:transparent;cursor:pointer;color:rgba(190,24,93,.28);user-select:none;font-size:13px;}
.us-btn.on-ns{border-color:var(--pink);background:var(--pink-fade);color:var(--pink);}
.us-btn.on-wip{border-color:var(--amber);background:var(--amber-bg);color:var(--amber);}
.us-btn.on-done{border-color:var(--green);background:var(--green-bg);color:var(--green);}

/* ICON BUTTONS */
.ico{background:none;border:none;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;width:28px;height:28px;border-radius:5px;font-size:13px;}
.ico:active{background:var(--fade);}
.ico.due-ico{opacity:.2;color:var(--navy);}
.ico.due-ico.set{opacity:.5;}
.ico.due-ico.late{opacity:1;color:var(--red);}
.ico.del-ico{opacity:.2;color:var(--navy);font-size:15px;}
.ico.promote-ico{opacity:.22;color:var(--pink);}
.ico.promote-ico:active{opacity:.8;}
.demote-btn{font-size:12px;background:none;border:none;cursor:pointer;opacity:.28;color:var(--navy);padding:2px;display:inline-flex;}
.demote-btn:active{opacity:1;}
.u-del-btn{font-size:14px;background:none;border:none;cursor:pointer;opacity:.2;color:var(--navy);padding:2px;display:inline-flex;}
.u-del-btn:active{opacity:1;}

/* EMPTY CELL */
.empty-cell{text-align:center;padding:2rem;opacity:.35;font-size:11px;vertical-align:middle;}
.empty-cell.pink-cell{background:var(--pink-bg);}

/* ADD ROWS */
.add-section{display:flex;gap:0;border-top:1.5px solid var(--navy);}
.add-left{flex:1;padding:.6rem .6rem;border-right:1px solid var(--fade);}
.add-right{padding:.6rem .6rem;background:var(--pink-bg);border-left:1px solid var(--pink-border);}
.add-row{display:flex;gap:6px;}
.add-inp{flex:1;min-width:0;padding:0 10px;height:34px;border:1px solid var(--fade);border-radius:20px;background:rgba(27,45,91,0.04);font-family:var(--mono);font-size:12px;color:var(--navy);outline:none;}
.add-inp:focus{border-color:var(--navy);}
.add-inp::placeholder{color:var(--navy);opacity:.35;}
.add-btn{padding:0 12px;height:34px;background:var(--navy);border:none;border-radius:20px;font-family:var(--mono);font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:var(--cream);cursor:pointer;white-space:nowrap;}
.add-btn:active{opacity:.75;}
.u-add-inp{flex:1;min-width:0;padding:0 10px;height:34px;border:1px solid var(--pink-border);border-radius:20px;background:transparent;font-family:var(--mono);font-size:12px;color:var(--navy);outline:none;}
.u-add-inp:focus{border-color:var(--pink);}
.u-add-inp::placeholder{color:var(--pink);opacity:.45;}
.u-add-btn{padding:0 12px;height:34px;background:var(--pink);border:none;border-radius:20px;font-family:var(--mono);font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:#fff;cursor:pointer;white-space:nowrap;}
.u-add-btn:active{opacity:.75;}

.footer{text-align:center;padding:1.4rem;border-top:1.5px solid var(--navy);font-family:var(--serif);font-size:clamp(13px,3vw,16px);color:var(--navy);margin-top:auto;}
.footer em{font-style:italic;}

.sync-dot{position:fixed;top:10px;right:10px;width:8px;height:8px;border-radius:50%;background:#ccc;z-index:999;}
.sync-dot.syncing{background:var(--amber);animation:blink 1s infinite;}
.sync-dot.synced{background:var(--green);}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

.modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:500;display:none;align-items:center;justify-content:center;padding:20px;}
.modal-backdrop.open{display:flex;}
.modal-box{background:var(--cream);border:1.5px solid var(--navy);border-radius:10px;padding:24px;width:100%;max-width:320px;}
.modal-title{font-family:var(--serif);font-size:20px;margin-bottom:14px;color:var(--navy);}
.modal-inp{width:100%;padding:0 12px;height:40px;border:1.5px solid var(--fade);border-radius:6px;background:transparent;font-family:var(--mono);font-size:14px;color:var(--navy);outline:none;margin-bottom:14px;}
.modal-inp:focus{border-color:var(--navy);}
.modal-btns{display:flex;gap:8px;justify-content:flex-end;}
.modal-btn{padding:0 18px;height:36px;border-radius:6px;font-family:var(--mono);font-size:12px;letter-spacing:.05em;cursor:pointer;border:1.5px solid var(--navy);}
.modal-btn.cancel{background:none;color:var(--navy);}
.modal-btn.confirm{background:var(--navy);color:var(--cream);}

.confetti-wrap{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:9999;overflow:hidden;}
.cp{position:absolute;width:7px;height:7px;border-radius:2px;animation:fall 2.5s ease-out forwards;}
@keyframes fall{0%{transform:translateY(-20px) rotate(0deg);opacity:1}100%{transform:translateY(100vh) rotate(720deg);opacity:0}}
</style>
</head>
<body>
<div class="sync-dot" id="sync-dot"></div>
<div class="confetti-wrap" id="confetti"></div>
<div class="modal-backdrop" id="rename-modal">
  <div class="modal-box">
    <div class="modal-title">Rename page</div>
    <input class="modal-inp" id="rename-inp" maxlength="30" placeholder="Page name..."/>
    <div class="modal-btns">
      <button class="modal-btn cancel" id="rename-cancel">Cancel</button>
      <button class="modal-btn confirm" id="rename-confirm">Save</button>
    </div>
  </div>
</div>

<div class="app">
  <div class="hero">
    <h1><span class="script">Rafael's</span><span class="blk">Task</span></h1>
    <div class="prog-wrap">
      <div class="prog-row"><span id="prog-txt">0 / 0 done</span><span id="prog-pct">0%</span></div>
      <div class="prog-bar"><div class="prog-fill" id="prog-fill" style="width:0%"></div></div>
    </div>
  </div>

  <div class="top-bar">
    <button class="top-btn" id="search-btn" data-action="toggle-search">&#128269; Search</button>
    <button class="top-btn" id="dark-btn" data-action="toggle-dark">&#9790; Dark</button>
  </div>

  <div class="search-bar" id="search-bar">
    <input class="search-inp" id="search-inp" placeholder="Search tasks & notes..."/>
  </div>

  <div class="page-nav">
    <button class="nav-btn" id="prev-btn" disabled data-action="prev">&#8592; Prev</button>
    <div class="tabs-wrap" id="page-tabs"></div>
    <button class="add-pg-btn" data-action="add-page">+ Page</button>
    <button class="nav-btn" id="next-btn" data-action="next">Next &#8594;</button>
  </div>

  <div class="legend">
    <div class="leg-item"><div class="pip pip-ns"></div>Hasn't started</div>
    <div class="leg-item"><div class="pip pip-wip"></div>In progress</div>
    <div class="leg-item"><div class="pip pip-done"></div>Done</div>
  </div>

  <div class="tbl-wrap">
    <table class="unified">
      <colgroup>
        <col class="c-lname"><col class="c-lstatus"><col class="c-lstatus"><col class="c-lstatus"><col class="c-lact">
        <col class="c-div">
        <col class="c-rname"><col class="c-rstatus"><col class="c-rstatus"><col class="c-rstatus"><col class="c-ract">
      </colgroup>
      <thead>
        <tr>
          <th class="lh lh-name">Task</th>
          <th class="lh">NS</th><th class="lh">WIP</th><th class="lh">Done</th><th class="lh"></th>
          <th class="th-div"></th>
          <th class="rh rh-name">&#128293; Urgent <span id="urgent-count" style="font-size:9px;opacity:.7;"></span></th>
          <th class="rh">NS</th><th class="rh">WIP</th><th class="rh">Done</th><th class="rh"></th>
        </tr>
      </thead>
      <tbody id="unified-tbody"></tbody>
    </table>
  </div>

  <div class="add-section">
    <div class="add-left">
      <div class="add-row">
        <input class="add-inp" id="new-task" placeholder="Add a task..." maxlength="120" type="text"/>
        <button class="add-btn" data-action="add-task">Add</button>
      </div>
    </div>
    <div class="add-right">
      <div class="add-row">
        <input class="u-add-inp" id="urgent-inp" placeholder="Add urgent..." maxlength="120" type="text"/>
        <button class="u-add-btn" data-action="add-urgent">Add</button>
      </div>
    </div>
  </div>

  <div class="footer">remember, <em>consistency</em> over perfection.</div>
</div>

<script>
var firebaseConfig={apiKey:"AIzaSyAKjFquqD9utrbw2xAre27rgJL-j7ZvBLI",authDomain:"rafael-task.firebaseapp.com",databaseURL:"https://rafael-task-default-rtdb.asia-southeast1.firebasedatabase.app",projectId:"rafael-task",storageBucket:"rafael-task.firebasestorage.app",messagingSenderId:"81911418322",appId:"1:81911418322:web:07f8b176e91792cd3fcc0b"};
firebase.initializeApp(firebaseConfig);
var db=firebase.database();
var dataRef=db.ref('rafaelTask5');
var isSyncing=false;
var syncDot=document.getElementById('sync-dot');
function setSynced(){syncDot.className='sync-dot synced';setTimeout(function(){syncDot.className='sync-dot';},2000);}
function setSyncing(){syncDot.className='sync-dot syncing';}

var S=JSON.parse(localStorage.getItem('rt8')||'null')||{page:0,pages:[{name:'Page 1',tasks:[],urgent:[]}],status:{},due:{},notes:{},dark:false};
if(!S.notes)S.notes={};
if(S.dark===undefined)S.dark=false;
S.pages.forEach(function(p){if(!p.urgent)p.urgent=[];});

var renamingPage=null;
var searchOpen=false;

function save(){
  try{localStorage.setItem('rt8',JSON.stringify(S));}catch(e){}
  if(!isSyncing){
    setSyncing();
    dataRef.set({pages:S.pages,status:S.status,due:S.due,notes:S.notes})
      .then(function(){setSynced();}).catch(function(){syncDot.className='sync-dot';});
  }
}

dataRef.on('value',function(snapshot){
  if(isSyncing)return;
  var data=snapshot.val();
  if(data){
    isSyncing=true;
    S.pages=data.pages||S.pages;
    S.status=data.status||{};
    S.due=data.due||{};
    S.notes=data.notes||{};
    S.pages.forEach(function(p){if(!p.urgent)p.urgent=[];});
    try{localStorage.setItem('rt8',JSON.stringify(S));}catch(e){}
    render();
    setTimeout(function(){isSyncing=false;},500);
  }
});

function pKey(ti){return S.page+'_'+ti;}
function uKey(ui){return 'u_'+S.page+'_'+ui;}
function getStatus(k){return S.status[k]||'ns';}
function setStatus(k,v){S.status[k]=v;save();render();}
function getDue(k){return S.due[k]||'';}
function setDue(k,v){if(v)S.due[k]=v;else delete S.due[k];save();render();}
function getNote(k){return S.notes[k]||'';}
function isLate(d){if(!d)return false;var t=new Date();t.setHours(0,0,0,0);return new Date(d)<t;}
function fmtDate(d){if(!d)return '';return new Date(d+'T00:00:00').toLocaleDateString('en-GB',{day:'numeric',month:'short'});}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function hl(text,q){if(!q)return esc(text);var re=new RegExp('('+q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','gi');return esc(text).replace(re,'<span class="highlight">$1</span>');}

function playPop(){try{var c=new(window.AudioContext||window.webkitAudioContext)();var o=c.createOscillator();var g=c.createGain();o.connect(g);g.connect(c.destination);o.type='sine';o.frequency.setValueAtTime(600,c.currentTime);o.frequency.exponentialRampToValueAtTime(900,c.currentTime+0.05);g.gain.setValueAtTime(0.3,c.currentTime);g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+0.15);o.start(c.currentTime);o.stop(c.currentTime+0.15);}catch(e){}}
function playDone(){try{var c=new(window.AudioContext||window.webkitAudioContext)();[523,659,784].forEach(function(f,i){var o=c.createOscillator();var g=c.createGain();o.connect(g);g.connect(c.destination);o.type='sine';o.frequency.value=f;g.gain.setValueAtTime(0.2,c.currentTime+i*0.1);g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+i*0.1+0.2);o.start(c.currentTime+i*0.1);o.stop(c.currentTime+i*0.1+0.2);});}catch(e){}}
function playDelete(){try{var c=new(window.AudioContext||window.webkitAudioContext)();var o=c.createOscillator();var g=c.createGain();o.connect(g);g.connect(c.destination);o.type='sine';o.frequency.setValueAtTime(400,c.currentTime);o.frequency.exponentialRampToValueAtTime(200,c.currentTime+0.15);g.gain.setValueAtTime(0.25,c.currentTime);g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+0.2);o.start(c.currentTime);o.stop(c.currentTime+0.2);}catch(e){}}
function confetti(){var wrap=document.getElementById('confetti');var colors=['#B45309','#be185d','#2E7D52','#1B2D5B','#FEF3C7','#fdf2f8'];for(var i=0;i<30;i++){var p=document.createElement('div');p.className='cp';p.style.left=Math.random()*100+'vw';p.style.background=colors[Math.floor(Math.random()*colors.length)];p.style.animationDelay=Math.random()*.6+'s';p.style.animationDuration=(2+Math.random())+'s';wrap.appendChild(p);setTimeout(function(el){el.remove();},3500,p);}}

function applyDark(){document.body.classList.toggle('dark',S.dark);document.getElementById('dark-btn').textContent=S.dark?'☀ Light':'☾ Dark';}
applyDark();

function buildLeftCell(task, ti, q) {
  var k=pKey(ti); var cur=getStatus(k); var due=getDue(k); var late=isLate(due)&&cur!=='done'; var pid='dp_'+ti;
  var td=document.createElement('td'); td.className='tc-lname';
  var row=document.createElement('div'); row.className='t-row';
  var txt=document.createElement('span'); txt.className='t-text'; txt.innerHTML=(ti+1)+'. '+hl(task,q); row.appendChild(txt);
  var proBtn=document.createElement('button'); proBtn.className='ico promote-ico'; proBtn.title='Move to urgent'; proBtn.innerHTML='&#128293;'; proBtn.dataset.action='promote'; proBtn.dataset.ti=ti; row.appendChild(proBtn);
  var dueBtn=document.createElement('button'); dueBtn.className='ico due-ico'+(due?(late?' late':' set'):''); dueBtn.innerHTML='&#x1F4C5;'; dueBtn.dataset.action='toggle-dp'; dueBtn.dataset.id=pid; row.appendChild(dueBtn);
  var delBtn=document.createElement('button'); delBtn.className='ico del-ico'; delBtn.innerHTML='&#215;'; delBtn.dataset.action='del'; delBtn.dataset.ti=ti; row.appendChild(delBtn);
  td.appendChild(row);
  if(due){var chip=document.createElement('div');chip.className='due-chip'+(late?' late':'');chip.textContent='due '+fmtDate(due)+(late?' · overdue':'');td.appendChild(chip);}
  var dp=document.createElement('div');dp.className='dp-wrap';dp.id=pid;
  var dpInp=document.createElement('input');dpInp.className='dp-inp';dpInp.type='date';dpInp.value=due;dpInp.dataset.action='set-due';dpInp.dataset.ti=ti;dp.appendChild(dpInp);
  if(due){var clr=document.createElement('button');clr.className='dp-clear';clr.innerHTML='&#215;';clr.dataset.action='clear-due';clr.dataset.ti=ti;dp.appendChild(clr);}
  td.appendChild(dp);
  var ta=document.createElement('textarea');ta.className='note-ta';ta.placeholder='Add note...';ta.value=getNote(k);ta.rows=getNote(k)?2:1;ta.dataset.k=k;
  ta.addEventListener('input',function(){S.notes[this.dataset.k]=this.value;save();});
  td.appendChild(ta);
  return td;
}

function buildRightCell(task, ui, q) {
  var k=uKey(ui); var cur=getStatus(k);
  var td=document.createElement('td'); td.className='tc-rname';
  var nameDiv=document.createElement('div'); nameDiv.className='t-text'; nameDiv.innerHTML=hl(task,q); td.appendChild(nameDiv);
  var ta=document.createElement('textarea');ta.className='note-ta pink-note';ta.placeholder='Add note...';ta.value=getNote(k);ta.rows=getNote(k)?2:1;ta.dataset.k=k;
  ta.addEventListener('input',function(){S.notes[this.dataset.k]=this.value;save();});
  td.appendChild(ta);
  return td;
}

function buildEmptyLeft() {
  var td=document.createElement('td'); td.className='tc-lname empty-cell'; td.colSpan=5; td.textContent='No tasks yet'; return td;
}
function buildEmptyRight() {
  var td=document.createElement('td'); td.className='empty-cell pink-cell'; td.colSpan=5; td.textContent='No urgent tasks \uD83C\uDF89'; return td;
}

function render(){
  var q=searchOpen?(document.getElementById('search-inp').value||'').trim().toLowerCase():'';
  var p=S.page; var pg=S.pages[p];

  // TABS
  var tabsEl=document.getElementById('page-tabs'); tabsEl.innerHTML='';
  S.pages.forEach(function(page,i){
    var grp=document.createElement('div'); grp.className='tab-group'+(i===p?' on':'');
    var t=document.createElement('button'); t.className='tab'; t.textContent=page.name; t.dataset.action='goto-page'; t.dataset.pi=i; grp.appendChild(t);
    var rn=document.createElement('button'); rn.className='tab-rename'; rn.innerHTML='&#9998;'; rn.title='Rename'; rn.dataset.action='rename-page'; rn.dataset.pi=i; grp.appendChild(rn);
    if(S.pages.length>1){var x=document.createElement('button'); x.className='tab-del'; x.innerHTML='&#215;'; x.dataset.action='del-page'; x.dataset.pi=i; grp.appendChild(x);}
    tabsEl.appendChild(grp);
  });
  document.getElementById('prev-btn').disabled=p===0;
  document.getElementById('next-btn').disabled=p===S.pages.length-1;

  // PROGRESS
  var tasks=pg.tasks||[]; var urgentTasks=pg.urgent||[];
  var doneCount=0; var total=tasks.length+urgentTasks.length;
  tasks.forEach(function(_,ti){if(getStatus(pKey(ti))==='done')doneCount++;});
  urgentTasks.forEach(function(_,ui){if(getStatus(uKey(ui))==='done')doneCount++;});
  var pct=total?Math.round(doneCount/total*100):0;
  document.getElementById('prog-txt').textContent=doneCount+' / '+total+' done';
  document.getElementById('prog-pct').textContent=pct+'%';
  document.getElementById('prog-fill').style.width=pct+'%';

  // FILTER
  var visTasks=q?tasks.filter(function(t,ti){return t.toLowerCase().includes(q)||(getNote(pKey(ti))||'').toLowerCase().includes(q);}):tasks;
  var visUrgent=q?urgentTasks.filter(function(t,ui){return t.toLowerCase().includes(q)||(getNote(uKey(ui))||'').toLowerCase().includes(q);}):urgentTasks;
  document.getElementById('urgent-count').textContent='('+visUrgent.length+')';

  // BUILD UNIFIED TABLE
  var tbody=document.getElementById('unified-tbody'); tbody.innerHTML='';
  var maxRows=Math.max(visTasks.length, visUrgent.length, 1);

  // Map filtered back to real indices
  var leftIndices=[];
  tasks.forEach(function(t,ti){if(!q||(t.toLowerCase().includes(q)||(getNote(pKey(ti))||'').toLowerCase().includes(q)))leftIndices.push(ti);});
  var rightIndices=[];
  urgentTasks.forEach(function(t,ui){if(!q||(t.toLowerCase().includes(q)||(getNote(uKey(ui))||'').toLowerCase().includes(q)))rightIndices.push(ui);});

  maxRows=Math.max(leftIndices.length, rightIndices.length, 1);

  for(var row=0; row<maxRows; row++){
    var tr=document.createElement('tr');

    // LEFT SIDE
    if(row < leftIndices.length){
      var ti=leftIndices[row];
      var task=tasks[ti];
      var k=pKey(ti); var cur=getStatus(k);
      tr.appendChild(buildLeftCell(task, ti, q));
      ['ns','wip','done'].forEach(function(v){
        var ctd=document.createElement('td'); ctd.className='tc-cell';
        var btn=document.createElement('button'); btn.className='s-btn'+(cur===v?' on-'+v:'');
        btn.innerHTML=v==='ns'?'○':v==='wip'?'◑':'●';
        btn.dataset.action='status'; btn.dataset.ti=ti; btn.dataset.val=v;
        ctd.appendChild(btn); tr.appendChild(ctd);
      });
      // action cell (empty placeholder for alignment)
      tr.appendChild(document.createElement('td'));
    } else {
      // empty left cells
      if(row===0 && leftIndices.length===0){
        var etd=buildEmptyLeft(); etd.colSpan=5; tr.appendChild(etd);
      } else {
        for(var c=0;c<5;c++) tr.appendChild(document.createElement('td'));
      }
    }

    // DIVIDER
    var div=document.createElement('td'); div.className='tc-div'; tr.appendChild(div);

    // RIGHT SIDE
    if(row < rightIndices.length){
      var ui=rightIndices[row];
      var utask=urgentTasks[ui];
      var uk=uKey(ui); var ucur=getStatus(uk);
      tr.appendChild(buildRightCell(utask, ui, q));
      ['ns','wip','done'].forEach(function(v){
        var ctd=document.createElement('td'); ctd.className='tc-cell pink-cell';
        var btn=document.createElement('button'); btn.className='us-btn'+(ucur===v?' on-'+v:'');
        btn.innerHTML=v==='ns'?'○':v==='wip'?'◑':'●';
        btn.dataset.action='urgent-status'; btn.dataset.ui=ui; btn.dataset.val=v;
        ctd.appendChild(btn); tr.appendChild(ctd);
      });
      // urgent actions
      var atd=document.createElement('td'); atd.className='tc-cell pink-cell'; atd.style.whiteSpace='nowrap';
      var db2=document.createElement('button'); db2.className='demote-btn'; db2.title='Move to tasks'; db2.innerHTML='&#8595;'; db2.dataset.action='demote'; db2.dataset.ui=ui;
      var dlb=document.createElement('button'); dlb.className='u-del-btn'; dlb.innerHTML='&#215;'; dlb.dataset.action='del-urgent'; dlb.dataset.ui=ui;
      atd.appendChild(db2); atd.appendChild(dlb); tr.appendChild(atd);
    } else {
      if(row===0 && rightIndices.length===0){
        var ertd=buildEmptyRight(); ertd.colSpan=5; tr.appendChild(ertd);
      } else {
        var emptyPink=document.createElement('td'); emptyPink.colSpan=5; emptyPink.className='pink-cell'; tr.appendChild(emptyPink);
      }
    }

    tbody.appendChild(tr);
  }
}

document.addEventListener('click',function(e){
  var el=e.target.closest('[data-action]'); if(!el)return;
  var action=el.dataset.action;
  if(action==='status'){var v=el.dataset.val;var k=pKey(+el.dataset.ti);if(v==='done'){playDone();confetti();}else playPop();setStatus(k,v);}
  else if(action==='urgent-status'){var v=el.dataset.val;var k=uKey(+el.dataset.ui);if(v==='done'){playDone();confetti();}else playPop();setStatus(k,v);}
  else if(action==='promote'){
    playPop();var ti=+el.dataset.ti;var pg=S.pages[S.page];var task=pg.tasks[ti];
    var ok=pKey(ti);if(!pg.urgent)pg.urgent=[];var nk=uKey(pg.urgent.length);
    if(S.status[ok])S.status[nk]=S.status[ok];if(S.due[ok])S.due[nk]=S.due[ok];if(S.notes[ok])S.notes[nk]=S.notes[ok];
    delete S.status[ok];delete S.due[ok];delete S.notes[ok];
    pg.urgent.unshift(task);pg.tasks.splice(ti,1);save();render();
  }
  else if(action==='demote'){
    playPop();var ui=+el.dataset.ui;var pg=S.pages[S.page];var task=pg.urgent[ui];
    var ok=uKey(ui);if(!pg.tasks)pg.tasks=[];var nk=pKey(pg.tasks.length);
    if(S.status[ok])S.status[nk]=S.status[ok];if(S.due[ok])S.due[nk]=S.due[ok];if(S.notes[ok])S.notes[nk]=S.notes[ok];
    delete S.status[ok];delete S.due[ok];delete S.notes[ok];
    pg.tasks.push(task);pg.urgent.splice(ui,1);save();render();
  }
  else if(action==='del'){playDelete();if(confirm('Remove this task?')){S.pages[S.page].tasks.splice(+el.dataset.ti,1);save();render();}}
  else if(action==='del-urgent'){playDelete();if(confirm('Remove this urgent task?')){S.pages[S.page].urgent.splice(+el.dataset.ui,1);save();render();}}
  else if(action==='del-page'){var i=+el.dataset.pi;if(S.pages.length<=1)return;playDelete();if(confirm('Delete "'+S.pages[i].name+'"?')){S.pages.splice(i,1);if(S.page>=S.pages.length)S.page=S.pages.length-1;save();render();}}
  else if(action==='toggle-dp'){playPop();var dp=document.getElementById(el.dataset.id);if(!dp)return;var opening=!dp.classList.contains('open');document.querySelectorAll('.dp-wrap.open').forEach(function(x){x.classList.remove('open');});if(opening){dp.classList.add('open');setTimeout(function(){dp.querySelector('.dp-inp').focus();},60);}}
  else if(action==='clear-due'){playPop();setDue(pKey(+el.dataset.ti),'');}
  else if(action==='add-task'){doAddTask();}
  else if(action==='add-urgent'){doAddUrgent();}
  else if(action==='add-page'){playPop();S.pages.push({name:'Page '+(S.pages.length+1),tasks:[],urgent:[]});S.page=S.pages.length-1;save();render();}
  else if(action==='prev'){playPop();if(S.page>0){S.page--;save();render();}}
  else if(action==='next'){playPop();if(S.page<S.pages.length-1){S.page++;save();render();}}
  else if(action==='goto-page'){playPop();S.page=+el.dataset.pi;save();render();}
  else if(action==='rename-page'){openRename(+el.dataset.pi);}
  else if(action==='toggle-search'){toggleSearch();}
  else if(action==='toggle-dark'){S.dark=!S.dark;applyDark();save();}
});

document.addEventListener('change',function(e){var el=e.target.closest('[data-action="set-due"]');if(el){playPop();setDue(pKey(+el.dataset.ti),el.value);}});
document.getElementById('new-task').addEventListener('keydown',function(e){if(e.key==='Enter'){e.preventDefault();doAddTask();}});
document.getElementById('urgent-inp').addEventListener('keydown',function(e){if(e.key==='Enter'){e.preventDefault();doAddUrgent();}});

function doAddTask(){var inp=document.getElementById('new-task');var text=inp.value.trim();if(!text)return;playPop();if(!S.pages[S.page].tasks)S.pages[S.page].tasks=[];S.pages[S.page].tasks.push(text);inp.value='';inp.blur();save();render();}
function doAddUrgent(){var inp=document.getElementById('urgent-inp');var text=inp.value.trim();if(!text)return;playPop();if(!S.pages[S.page].urgent)S.pages[S.page].urgent=[];S.pages[S.page].urgent.unshift(text);inp.value='';inp.blur();save();render();}

function toggleSearch(){searchOpen=!searchOpen;var bar=document.getElementById('search-bar');var btn=document.getElementById('search-btn');bar.classList.toggle('open',searchOpen);btn.classList.toggle('active',searchOpen);if(searchOpen)document.getElementById('search-inp').focus();else{document.getElementById('search-inp').value='';render();}}
document.getElementById('search-inp').addEventListener('input',function(){render();});

function openRename(i){renamingPage=i;document.getElementById('rename-inp').value=S.pages[i].name;document.getElementById('rename-modal').classList.add('open');setTimeout(function(){document.getElementById('rename-inp').focus();},60);}
function closeRename(){document.getElementById('rename-modal').classList.remove('open');renamingPage=null;}
function confirmRename(){if(renamingPage===null)return;var val=document.getElementById('rename-inp').value.trim();if(val)S.pages[renamingPage].name=val;closeRename();save();render();}
document.getElementById('rename-cancel').addEventListener('click',closeRename);
document.getElementById('rename-confirm').addEventListener('click',function(){playPop();confirmRename();});
document.getElementById('rename-inp').addEventListener('keydown',function(e){if(e.key==='Enter')confirmRename();if(e.key==='Escape')closeRename();});
document.getElementById('rename-modal').addEventListener('click',function(e){if(e.target===this)closeRename();});

render();
</script>
</body>
</html>
